name: ITCSuite Desktop macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-macos:
    name: desktop-macos
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R test dependencies
        env:
          R_LIBS_USER: ${{ github.workspace }}/.github-tmp/r-lib-tests
        run: |
          mkdir -p "${R_LIBS_USER}"
          Rscript -e 'install.packages(c("testthat","shinytest2","shiny","rootSolve","tidyverse","DT","DEoptim","readxl","writexl","plotly","patchwork","jsonlite","later","digest","MASS","gridExtra","colourpicker"), repos="https://cloud.r-project.org")'

      - name: Run existing strict test suites
        run: Rscript tests/run_all.R --strict

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build bundled R runtime
        working-directory: desktop
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest --macos-min-version 13.0

      - name: Bundled runtime graphics smoke
        working-directory: desktop
        run: npm run smoke:graphics

      - name: Desktop smoke test
        working-directory: desktop
        env:
          ITCSUITE_USE_BUNDLED_R: "1"
        run: npm run smoke

      - name: Check signing/notarization secrets
        id: signing
        run: |
          if [[ -n "${{ secrets.MACOS_CERT_P12_BASE64 }}" && -n "${{ secrets.MACOS_CERT_PASSWORD }}" && -n "${{ secrets.APPLE_ID }}" && -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight Apple notary connectivity
        if: ${{ false }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while (( attempt <= max_attempts )); do
            echo "Notary connectivity probe ${attempt}/${max_attempts}"
            set +e
            xcrun notarytool history \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" \
              --output-format json >/dev/null 2>"${RUNNER_TEMP}/notary-probe-attempt-${attempt}.log"
            status=$?
            set -e

            if [[ "${status}" -eq 0 ]]; then
              exit 0
            fi

            if grep -Eq "NSURLErrorDomain Code=-1009|No network route|The Internet connection appears to be offline|timed out|Could not resolve host|network" "${RUNNER_TEMP}/notary-probe-attempt-${attempt}.log"; then
              if (( attempt < max_attempts )); then
                sleep_seconds=$(( attempt * 20 ))
                echo "Transient network failure detected, retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi

            exit "${status}"
          done

          echo "Notary connectivity probe failed after ${max_attempts} attempts."
          exit 1

      - name: Build macOS artifacts (signed; notarized via follow-up step)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run ensure:r-runtime
          ./node_modules/.bin/electron-builder --mac dmg --config.mac.notarize=false

      - name: Restore notarization submission state
        if: steps.signing.outputs.enabled == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ViaBind_ITCSuite-notary-state-${{ github.run_id }}
          path: ${{ github.workspace }}/.github-tmp/notary-state

      - name: Notarize built macOS artifacts (retry only notarization)
        if: steps.signing.outputs.enabled == 'true'
        timeout-minutes: 300
        working-directory: desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.dmg)
          if (( ${#artifacts[@]} == 0 )); then
            echo "No macOS artifacts found for notarization."
            exit 1
          fi

          poll_interval_seconds=45
          poll_timeout_seconds=14400
          progress_notice_seconds=7200
          state_dir="${GITHUB_WORKSPACE}/.github-tmp/notary-state"
          state_file="${state_dir}/submission-ids.tsv"
          mkdir -p "${state_dir}"
          touch "${state_file}"

          for artifact in "${artifacts[@]}"; do
            artifact_base="$(basename "${artifact}")"
            artifact_sha="$(shasum -a 256 "${artifact}" | awk '{print $1}')"
            submit_log="${RUNNER_TEMP}/notary-submit-${artifact_base}.log"
            info_json="${RUNNER_TEMP}/notary-info-${artifact_base}.json"
            invalid_log="${RUNNER_TEMP}/notary-invalid-${artifact_base}.log"
            submission_id="$(
              awk -F '\t' -v name="${artifact_base}" -v sha="${artifact_sha}" '$1 == name && $2 == sha {print $3; exit}' "${state_file}"
            )"

            if [[ -n "${submission_id}" ]]; then
              echo "Reusing notarization submission id for ${artifact_base}: ${submission_id}"
            else
              previous_sha="$(
                awk -F '\t' -v name="${artifact_base}" '$1 == name {print $2; exit}' "${state_file}"
              )"
              if [[ -n "${previous_sha}" && "${previous_sha}" != "${artifact_sha}" ]]; then
                echo "::warning::Found prior submission state for ${artifact_base}, but artifact hash changed; creating a fresh submission."
              fi

              echo "Submitting for notarization: ${artifact}"
              set +e
              xcrun notarytool submit "${artifact}" \
                --apple-id "${APPLE_ID}" \
                --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
                --team-id "${APPLE_TEAM_ID}" \
                --output-format json 2>&1 | tee "${submit_log}"
              submit_status=${PIPESTATUS[0]}
              set -e
              if [[ "${submit_status}" -ne 0 ]]; then
                echo "Notary submission failed before polling."
                exit "${submit_status}"
              fi

              submission_id="$(
                sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([0-9a-fA-F-]\{36\}\)".*/\1/p' "${submit_log}" | head -n1
              )"
              if [[ -z "${submission_id}" ]]; then
                echo "Unable to parse notarization submission id from output."
                cat "${submit_log}"
                exit 1
              fi

              tmp_state="${state_file}.tmp"
              awk -F '\t' -v name="${artifact_base}" '$1 != name' "${state_file}" > "${tmp_state}" || true
              mv "${tmp_state}" "${state_file}"
              printf '%s\t%s\t%s\n' "${artifact_base}" "${artifact_sha}" "${submission_id}" >> "${state_file}"
            fi

            echo "Notary submission id: ${submission_id}"
            start_epoch=$(date +%s)
            deadline=$(( start_epoch + poll_timeout_seconds ))
            progress_notice_emitted=0

            while true; do
              now_epoch=$(date +%s)
              if (( now_epoch > deadline )); then
                echo "Timed out while polling notarization status (${poll_timeout_seconds}s)."
                echo "Submission id: ${submission_id}"
                echo "::warning::Notarization remained In Progress too long. Re-run failed jobs to continue polling the same submission id."
                exit 124
              fi

              xcrun notarytool info "${submission_id}" \
                --apple-id "${APPLE_ID}" \
                --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
                --team-id "${APPLE_TEAM_ID}" \
                --output-format json > "${info_json}"

              status="$(tr -d '\n' < "${info_json}" | sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
              if [[ -z "${status}" ]]; then
                echo "Could not parse notarization status, raw response:"
                cat "${info_json}"
                exit 1
              fi

              echo "Submission ${submission_id} status: ${status}"
              elapsed_seconds=$(( now_epoch - start_epoch ))
              if [[ "${status}" == "In Progress" ]] && (( elapsed_seconds >= progress_notice_seconds )) && (( progress_notice_emitted == 0 )); then
                elapsed_minutes=$(( elapsed_seconds / 60 ))
                echo "Notice: notarization has been In Progress for ${elapsed_minutes} minutes; continuing to poll."
                progress_notice_emitted=1
              fi
              if [[ "${status}" == "Accepted" ]]; then
                echo "Notarization succeeded: ${artifact}"
                break
              fi
              if [[ "${status}" == "Invalid" ]]; then
                echo "Notarization invalid for ${artifact}; fetching log..."
                xcrun notarytool log "${submission_id}" \
                  --apple-id "${APPLE_ID}" \
                  --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
                  --team-id "${APPLE_TEAM_ID}" > "${invalid_log}" || true
                cat "${invalid_log}"
                exit 1
              fi

              sleep "${poll_interval_seconds}"
            done
          done

      - name: Persist notarization submission state
        if: ${{ always() && steps.signing.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-notary-state-${{ github.run_id }}
          compression-level: 0
          if-no-files-found: ignore
          overwrite: true
          path: |
            ${{ github.workspace }}/.github-tmp/notary-state/submission-ids.tsv

      - name: Staple notarized DMG artifacts
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(dist/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "No DMG files to staple."
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Stapling: ${dmg}"
            xcrun stapler staple "${dmg}"
            xcrun stapler validate "${dmg}"
          done

      - name: Build macOS artifacts (unsigned fallback)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run ensure:r-runtime
          ./node_modules/.bin/electron-builder --mac dmg --config.mac.identity=null --config.mac.notarize=false

      - name: Warn when artifacts are unsigned
        if: steps.signing.outputs.enabled != 'true'
        run: |
          echo "::warning::macOS artifacts are unsigned/unnotarized. Downloaded app may show 'damaged' or be blocked by Gatekeeper."

      - name: Generate checksums
        working-directory: desktop
        run: |
          shopt -s nullglob
          files=(dist/*.dmg)
          if (( ${#files[@]} == 0 )); then
            echo "No macOS artifacts generated under desktop/dist"
            exit 1
          fi
          shasum -a 256 "${files[@]}" > dist/SHA256SUMS.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-desktop-macos
          compression-level: 0
          path: |
            desktop/dist/*.dmg
            desktop/dist/SHA256SUMS.txt
