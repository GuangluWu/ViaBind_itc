name: ITCSuite Desktop macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-macos:
    name: desktop-macos
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R test dependencies
        run: |
          Rscript -e 'install.packages(c("testthat","shinytest2","shiny","rootSolve","tidyverse","DT","DEoptim","readxl","writexl","plotly","patchwork","jsonlite","later","digest","MASS","gridExtra","colourpicker"), repos="https://cloud.r-project.org")'

      - name: Run existing strict test suites
        run: Rscript tests/run_all.R --strict

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build bundled R runtime
        working-directory: desktop
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest

      - name: Desktop smoke test
        working-directory: desktop
        run: npm run smoke

      - name: Check signing/notarization secrets
        id: signing
        run: |
          if [[ -n "${{ secrets.MACOS_CERT_P12_BASE64 }}" && -n "${{ secrets.MACOS_CERT_PASSWORD }}" && -n "${{ secrets.APPLE_ID }}" && -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS artifacts (signed + notarized)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while (( attempt <= max_attempts )); do
            echo "Signed/notarized build attempt ${attempt}/${max_attempts}"
            set +e
            npm run dist 2>&1 | tee "${RUNNER_TEMP}/dist-macos-attempt-${attempt}.log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "${status}" -eq 0 ]]; then
              exit 0
            fi

            if grep -Eq "NSURLErrorDomain Code=-1009|No network route|The Internet connection appears to be offline|Failed to notarize via notarytool" "${RUNNER_TEMP}/dist-macos-attempt-${attempt}.log"; then
              if (( attempt < max_attempts )); then
                sleep_seconds=$(( attempt * 60 ))
                echo "Transient notarization/network failure detected, retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi

            exit "${status}"
          done

          echo "Build failed after ${max_attempts} attempts."
          exit 1

      - name: Build macOS artifacts (unsigned fallback)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --config.mac.identity=null

      - name: Warn when artifacts are unsigned
        if: steps.signing.outputs.enabled != 'true'
        run: |
          echo "::warning::macOS artifacts are unsigned/unnotarized. Downloaded app may show 'damaged' or be blocked by Gatekeeper."

      - name: Generate checksums
        working-directory: desktop
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.zip)
          if (( ${#files[@]} == 0 )); then
            echo "No macOS artifacts generated under desktop/dist"
            exit 1
          fi
          shasum -a 256 "${files[@]}" > dist/SHA256SUMS.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-desktop-macos
          compression-level: 0
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/SHA256SUMS.txt
