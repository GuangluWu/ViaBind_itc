name: ITCSuite Desktop macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-macos:
    name: desktop-macos
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R test dependencies
        run: |
          Rscript -e 'install.packages(c("testthat","shinytest2","shiny","rootSolve","tidyverse","DT","DEoptim","readxl","writexl","plotly","patchwork","jsonlite","later","digest","MASS","gridExtra","colourpicker"), repos="https://cloud.r-project.org")'

      - name: Run existing strict test suites
        run: Rscript tests/run_all.R --strict

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build bundled R runtime
        working-directory: desktop
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest

      - name: Desktop smoke test
        working-directory: desktop
        run: npm run smoke

      - name: Check signing/notarization secrets
        id: signing
        run: |
          if [[ -n "${{ secrets.MACOS_CERT_P12_BASE64 }}" && -n "${{ secrets.MACOS_CERT_PASSWORD }}" && -n "${{ secrets.APPLE_ID }}" && -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight Apple notary connectivity
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while (( attempt <= max_attempts )); do
            echo "Notary connectivity probe ${attempt}/${max_attempts}"
            set +e
            xcrun notarytool history \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" \
              --output-format json >/dev/null 2>"${RUNNER_TEMP}/notary-probe-attempt-${attempt}.log"
            status=$?
            set -e

            if [[ "${status}" -eq 0 ]]; then
              exit 0
            fi

            if grep -Eq "NSURLErrorDomain Code=-1009|No network route|The Internet connection appears to be offline|timed out|Could not resolve host|network" "${RUNNER_TEMP}/notary-probe-attempt-${attempt}.log"; then
              if (( attempt < max_attempts )); then
                sleep_seconds=$(( attempt * 20 ))
                echo "Transient network failure detected, retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi

            exit "${status}"
          done

          echo "Notary connectivity probe failed after ${max_attempts} attempts."
          exit 1

      - name: Build macOS artifacts (signed; notarization deferred)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --config.mac.notarize=false

      - name: Notarize built macOS artifacts (retry only notarization)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.dmg dist/*-mac.zip)
          if (( ${#artifacts[@]} == 0 )); then
            echo "No macOS artifacts found for notarization."
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            echo "Submitting for notarization: ${artifact}"
            max_attempts=4
            attempt=1
            while (( attempt <= max_attempts )); do
              log_file="${RUNNER_TEMP}/notary-$(basename "${artifact}")-attempt-${attempt}.log"
              set +e
              xcrun notarytool submit "${artifact}" \
                --apple-id "${APPLE_ID}" \
                --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
                --team-id "${APPLE_TEAM_ID}" \
                --wait 2>&1 | tee "${log_file}"
              status=${PIPESTATUS[0]}
              set -e

              if [[ "${status}" -eq 0 ]]; then
                echo "Notarization succeeded: ${artifact}"
                break
              fi

              if grep -Eq "NSURLErrorDomain Code=-1009|No network route|The Internet connection appears to be offline|timed out|Could not resolve host|network" "${log_file}"; then
                if (( attempt < max_attempts )); then
                  sleep_seconds=$(( attempt * 60 ))
                  echo "Transient network failure during notarization, retrying in ${sleep_seconds}s..."
                  sleep "${sleep_seconds}"
                  attempt=$(( attempt + 1 ))
                  continue
                fi
              fi

              exit "${status}"
            done
          done

      - name: Staple notarized DMG artifacts
        if: steps.signing.outputs.enabled == 'true'
        working-directory: desktop
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(dist/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "No DMG files to staple."
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Stapling: ${dmg}"
            xcrun stapler staple "${dmg}"
            xcrun stapler validate "${dmg}"
          done

      - name: Build macOS artifacts (unsigned fallback)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --config.mac.identity=null

      - name: Warn when artifacts are unsigned
        if: steps.signing.outputs.enabled != 'true'
        run: |
          echo "::warning::macOS artifacts are unsigned/unnotarized. Downloaded app may show 'damaged' or be blocked by Gatekeeper."

      - name: Generate checksums
        working-directory: desktop
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.zip)
          if (( ${#files[@]} == 0 )); then
            echo "No macOS artifacts generated under desktop/dist"
            exit 1
          fi
          shasum -a 256 "${files[@]}" > dist/SHA256SUMS.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-desktop-macos
          compression-level: 0
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/SHA256SUMS.txt
