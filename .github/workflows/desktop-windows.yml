name: ViaBind Desktop Windows
run-name: ViaBind ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }} Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-windows:
    name: desktop-windows
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        id: setup_r_primary
        with:
          r-version: "4.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build bundled R runtime (R 4.5)
        id: build_runtime_primary
        continue-on-error: true
        working-directory: desktop
        env:
          ITCSUITE_R_REPO: https://packagemanager.posit.co/cran/2026-02-15
          ITCSUITE_R_PKG_TYPE: binary
          ITCSUITE_R_TIMEOUT: "600"
          ITCSUITE_R_RETRY: "2"
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest

      - name: Setup fallback R (4.4)
        id: setup_r_fallback
        if: steps.build_runtime_primary.outcome == 'failure'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Build bundled R runtime fallback (R 4.4)
        id: build_runtime_fallback
        if: steps.build_runtime_primary.outcome == 'failure'
        continue-on-error: true
        working-directory: desktop
        env:
          ITCSUITE_R_REPO: https://packagemanager.posit.co/cran/2026-02-15
          ITCSUITE_R_PKG_TYPE: binary
          ITCSUITE_R_TIMEOUT: "600"
          ITCSUITE_R_RETRY: "2"
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest

      - name: Assert bundled runtime build succeeded
        if: always()
        run: |
          if ("${{ steps.build_runtime_primary.outcome }}" -eq "success" -or "${{ steps.build_runtime_fallback.outcome }}" -eq "success") {
            Write-Host "Bundled runtime build succeeded."
            exit 0
          }
          Write-Error "Bundled runtime build failed on both R 4.5 and fallback R 4.4."
          exit 1

      - name: Graphics smoke test (bundled runtime)
        working-directory: desktop
        timeout-minutes: 10
        run: npm run smoke:graphics

      - name: Backend smoke test (headless)
        working-directory: desktop
        timeout-minutes: 10
        run: npm run smoke:backend

      - name: Build Windows artifacts
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ITCSUITE_R_PKG_TYPE: binary
        run: npm run dist:win

      - name: Packaged app smoke test
        working-directory: desktop
        timeout-minutes: 10
        run: node scripts/smoke-packaged.mjs --exe dist\\win-unpacked\\ViaBind.exe

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-desktop-windows
          path: |
            desktop/dist/*windows-x64-setup.exe
            desktop/dist/*windows-x64-setup.exe.blockmap
            desktop/dist/latest*.yml
