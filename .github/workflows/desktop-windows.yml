name: ViaBind Desktop Windows
run-name: ViaBind ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }} Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-windows:
    name: desktop-windows
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build bundled R runtime
        working-directory: desktop
        run: node scripts/build-r-runtime.mjs --strict-runtime-manifest

      - name: Backend smoke test (headless)
        working-directory: desktop
        timeout-minutes: 10
        run: npm run smoke:backend

      - name: Build Windows artifacts
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViaBind_ITCSuite-desktop-windows
          path: |
            desktop/dist/*windows-x64-setup.exe
            desktop/dist/*windows-x64-setup.exe.blockmap
            desktop/dist/latest*.yml
